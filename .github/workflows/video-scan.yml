name: Video Discovery Scan

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run video discovery
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/video-discover.js

      - name: Commit new videos
        run: |
          git config user.name "AMZ Video Bot"
          git config user.email "bot@amzpickleball.vn"
          git add data/videos.json
          git diff --staged --quiet || git commit -m "chore: update video suggestions $(date +%Y-%m-%d)"
          git push
