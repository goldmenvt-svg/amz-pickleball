name: Deploy to GitHub Pages

# DISABLED (TD-01, 2026-06-30): Vercel là host duy nhất (ADR-0001).
# Trigger đã đổi từ `push` sang `workflow_dispatch` để KHÔNG auto-deploy lên
# GitHub Pages — Pages không chạy được middleware Basic auth, api/, hay security
# headers. File giữ lại (không xoá) để có thể chạy thủ công nếu cần khẩn cấp;
# nếu rollback về Pages, BẮT BUỘC khoá/ẩn admin.html trước. Xem
# docs/design/DESIGN-deploy-consolidation.md và docs/runbooks/TD-01-*.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
